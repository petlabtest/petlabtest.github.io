    /* ———————————————————————————————————————————————————————————————————————————————————— */
    /* 首页巨型封面精修     */

    /* ———————————————————————————————————————————————————————————————————————————————————— */
    /* 特色大卡片：图片从顶部探出、不重叠、不裁切 */
    /* ———————————————————————————————————————————————————————————————————————————————————— */

    /* ———————————————————————————————————————————————————————————————————————————————————— */
    /* 快捷卡片样式 */
    /* ———————————————————————————————————————————————————————————————————————————————————— */
    /* 并排布局 */
    .card-row {
      display: flex;
      gap: 120px;
      /* 两张卡片之间的间距 */
      justify-content: center;
      margin-bottom: 2rem;
    }

    /* 卡片主体 */
    .card-with-bg {
      position: relative;
      display: block;
      margin: 10px 0;
      width: 100%;
      max-width: 500px;
      height: 300px;
      border-radius: 12px;
      background-size: cover;
      background-position: center;
      color: #fff;
      text-decoration: none;
      overflow: hidden;
      transition: 0.4s ease;
      /* 动画过渡 */
    }

    /* 背景模糊层 */
    .card-with-bg::before {
      content: "";
      position: absolute;
      inset: 0;
      background: inherit;
      filter: blur(2px);
      transform: scale(1.1);
      z-index: 0;
      transition: 0.6s ease;
      /* 动画过渡 */
    }

    .card-with-bg:hover::before {
      filter: blur(7px);
      /* 最大模糊 */
    }

    /* 深色半透明蒙版 */
    .card-mask {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1;
    }

    /* 悬浮时蒙版也加深一点，更高级 */
    .card-with-bg:hover .card-mask {
      background: rgba(0, 0, 0, 0.75);
    }

    /* 文字内容 */
    .card-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      /* 文字水平居中 */
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    /* 标题放大、居中 */
    .card-content h3 {
      font-size: 3.5rem;
      /* 放大字号 */
      margin: 0 0 0.8rem;
    }

    .card-content p {
      font-size: 1rem;
      opacity: 0.9;
      margin: 0;
    }

    /* 鼠标放上去变色 */
    .card-with-bg:hover h3 {
      color: #eabb5b;
      /* 你想要的颜色 */
    }

    /* 移动端自动上下排列 */
    @media (max-width: 768px) {
      .card-row {
        flex-direction: column;
        align-items: center;
      }
    }

    /* ———————————————————————————————————————————————————————————————————————————————————— */
    /* 简介区 */
    /* ———————————————————————————————————————————————————————————————————————————————————— */
    .dpl-about {
      background: #aacfe5;
    }

    .dpl-about p.lead {

      line-height: 1.7;

    /* ———————————————————————————————————————————————————————————————————————————————————— */
    /* our mission */
    /* ———————————————————————————————————————————————————————————————————————————————————— */
    .mission-full {
      display: block !important;
      width: 100% !important;
      background: #192b53 !important;
      /* 👈 背景色在这里，一定生效 */
      color: #f8f9fa;
      margin: 80px 0 !important;
      /* 👈 这里控制内部留白：上下左右 */
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    .mission-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }

    .mission-section h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 2rem;
      text-align: left;
    }

    .mission-container {
      display: flex;
      gap: 3rem;
      align-items: center;
    }

    /* ========== 左侧轮播 ========== */
    .mission-slider {
      flex: 1;
      position: relative;
      height: 320px;
      border-radius: 8px;
      overflow: hidden;
    }

    .slides {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .slide.active {
      opacity: 1;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 指示器 */
    .dots {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
    }

    .dot.active {
      background: white;
    }

    /* ========== 右侧固定文字 ========== */
    .mission-text {
      flex: 1;
    }

    .mission-content h2 {
      font-size: 2.8rem;
      margin-bottom: 1rem;
      font-weight: 800;
    }

    .mission-content p {
      font-size: 1.1rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .mission-link {
      color: #ffffff;
      font-weight: 500;
      text-decoration: none;
    }

    .mission-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .mission-container {
        flex-direction: column;
      }

      .mission-content {
        padding: 2rem;
      }
    }

    /* ———————————————————————————————————————————————————————————————————————————————————— */
    /* 人物区 */
    /* ———————————————————————————————————————————————————————————————————————————————————— */
    .people-section {
      max-width: 1200px;
      margin: 0 auto;
      /* 完全和新闻区域的内外间距统一 */
      padding: 3rem 2rem;
    }

    .people-title {
      font-size: 2.32rem;
      font-weight: 500;
      text-align: left;
      margin-bottom: 2rem;
      padding: 0rem 3rem;
    }

    /* 人物布局：严格和新闻卡片对齐 */
    .people-grid {
      display: flex;
      padding: 0 1.5rem;
    }

    .person-card {
      flex: 1;
      padding: 0 1.5rem;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* 分隔线 */
    .person-card+.person-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 1rem;
      bottom: 1rem;
      width: 1px;
      background-color: #ddd;
    }

    /* 图片 */
    .person-img {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1rem;
    }

    /* 名字 */
    .person-name {
      font-size: 1.7rem;
      font-weight: 600;
      margin-bottom: 1rem;
      /* 🔥 名字 ↔ 头衔间距（想多大改这里） */
    }

    /* 头衔 —— 这次 min-height 一定生效！ */
    .person-title {
      font-size: 0.95rem;
      color: #555;
      height: 4rem;
      /* 🔥 固定高度，改了一定生效 */
      margin-bottom: 1rem;
      /* 🔥 头衔 ↔ 引言间距 */
      display: block;
    }

    /* 引言 */
    .person-quote {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.5;
      font-style: italic;
      flex-grow: 1;
    }

    /* 链接 */
    .person-link {
      font-size: 0.95rem;
      color: #006699;
      text-decoration: none;
      margin-top: 1rem;
    }

    .person-link:hover {
      text-decoration: underline;
    }

    /* ———————————————————————————————————————————————————————————————————————————————————— */
    /* 新闻动态区 */
    /* ———————————————————————————————————————————————————————————————————————————————————— */
    .news-card {
      display: block;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
      transition: transform 0.2s ease;
    }

    .news-card:hover {
      transform: translateY(-4px);
    }

    .news-card__img img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .news-card__body {
      padding: 1.5rem;
    }

    .news-card__body h4 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .news-card__body p {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>

  <script>
    const slides = document.querySelectorAll(".slide");
    const dots = document.querySelectorAll(".dot");
    let current = 0;

    function showSlide(index) {
      slides.forEach((s, i) => {
        s.classList.toggle("active", i === index);
      });
      dots.forEach((d, i) => {
        d.classList.toggle("active", i === index);
      });
      current = index;
    }

    // 自动轮播 5 秒一张
    setInterval(() => {
      const next = (current + 1) % slides.length;
      showSlide(next);
    }, 3000);
  </script>
