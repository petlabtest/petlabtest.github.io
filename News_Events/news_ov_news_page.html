    ];

    /* 如果需要自动编号的话 */
    /*articles.forEach((item, index) => {
      item.id = index + 1; // 自动从 1 开始编号
    });*/

    // 每页显示数量
    const itemsPerPage = 10;
    let currentPage = 1;

    // 总页数
    function totalPages() {
      return Math.ceil(articles.length / itemsPerPage);
    }

    // 渲染文章
    function renderArticles() {
      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageArticles = articles.slice(start, end);

      const list = document.getElementById("articleList");
      list.innerHTML = "";

      pageArticles.forEach((art) => {
        // 这里可以正常使用 art.id 了！
        list.innerHTML += `
          <a class="page-text-list-paper-item" href="${art.url}" target="_blank">
            <div class="page-text-list-paper-meta">
              <div class="page-text-list-paper-type">${art.type}</div>
              <div>${art.date}</div>
            </div>
            <div class="page-text-list-paper-title">${art.title}</div>
            <div class="page-text-list-paper-image">
              <img src="${art.img}">
            </div>
          </a>
        `;
      });
    }

    // 渲染分页 << < 1 2 > >>
    function renderPagination() {
      const pager = document.getElementById("pagination");
      pager.innerHTML = "";
      const pages = totalPages();

      // 首页 <<
      const firstBtn = document.createElement("button");
      firstBtn.className = "page-text-list-page-btn";
      firstBtn.innerText = "<<";
      firstBtn.disabled = currentPage === 1;
      firstBtn.onclick = () => {
        currentPage = 1;
        renderArticles();
        renderPagination();
      };
      pager.appendChild(firstBtn);

      // 上一页 <
      const prevBtn = document.createElement("button");
      prevBtn.className = "page-text-list-page-btn";
      prevBtn.innerText = "<";
      prevBtn.disabled = currentPage === 1;
      prevBtn.onclick = () => {
        currentPage--;
        renderArticles();
        renderPagination();
      };
      pager.appendChild(prevBtn);

      // 页码
      for (let i = 1; i <= pages; i++) {
        const btn = document.createElement("button");
        btn.className =
          "page-text-list-page-btn " + (i === currentPage ? "active" : "");
        btn.innerText = i;
        btn.onclick = () => {
          currentPage = i;
          renderArticles();
          renderPagination();
        };
        pager.appendChild(btn);
      }

      // 下一页 >
      const nextBtn = document.createElement("button");
      nextBtn.className = "page-text-list-page-btn";
      nextBtn.innerText = ">";
      nextBtn.disabled = currentPage === pages;
      nextBtn.onclick = () => {
        currentPage++;
        renderArticles();
        renderPagination();
      };
      pager.appendChild(nextBtn);

      // 末页 >>
      const lastBtn = document.createElement("button");
      lastBtn.className = "page-text-list-page-btn";
      lastBtn.innerText = ">>";
      lastBtn.disabled = currentPage === pages;
      lastBtn.onclick = () => {
        currentPage = pages;
        renderArticles();
        renderPagination();
      };
      pager.appendChild(lastBtn);
    }

    // 初始化
    renderArticles();
    renderPagination();
  </script>

</body>
