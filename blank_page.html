    <link href="/css/global.css" rel="stylesheet" />

    
    <style>
      
    </style>
  </head>

  <body>
    <!-- 头部会自动加载到这里 -->
    <div id="header"></div>

    <!-- 底部会自动加载到这里 -->
    <div id="footer"></div>
  </body>
</html>
