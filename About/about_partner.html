    <style>
        /* 外层间距 */
        .partner-section {
            width: 100%;
            margin: 5rem 0;
        }

        /* 卡片容器：宽屏舒展 */
        .partner-card {
            width: 92%;
            max-width: 68rem;
            margin: 0 auto;
        }

        /* 内容色块：图片文字都在里面 */
        .partner-content {
            width: 100%;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            gap: 3rem;
            box-sizing: border-box;
        }

        /* 左图右文 配色 */
        .wrap-left .partner-content {
            background: var(--theme-color2);
        }

        /* 右图左文 配色 */
        .wrap-right .partner-content {
            background: var(--theme-color1);
            flex-direction: row-reverse;
        }

        /* 内嵌图片：在色块内部 */
        .partner-img-inner {
            width: 40%;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease;
        }

        .partner-img-inner:hover {
            transform: translateY(-5px);
        }

        /* 文字区域 */
        .partner-text {
            flex: 1;
            color: #fff;
        }

        /* 标题 */
        .partner-title {
            font-size: 2.4rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
            line-height: 1.3;
        }

        /* 列表间距 */
        .partner-list {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        /* 单行项目 */
        .partner-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5rem;
        }

        /* 链接按钮质感 */
        .partner-btn {
            padding: 0.5rem 1.6rem;
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 50px;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .partner-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
